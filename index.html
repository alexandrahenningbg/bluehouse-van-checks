<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Daily Essential Check</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; background: #f0f4f9; color: #1f1f1f; }
        .form-container { max-width: 640px; margin: 0 auto; }
        .header-card { background: #673ab7; color: white; padding: 24px; border-radius: 8px 8px 0 0; margin-bottom: 12px; }
        .header-card h1 { margin: 0; font-size: 32px; font-weight: normal; }
        .card { background: white; padding: 24px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #dadce0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .card-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; display: block; }
        .required::after { content: " *"; color: #d93025; }
        select, input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 14px; background: #fff; }
        .radio-group { display: flex; flex-direction: column; gap: 12px; }
        .radio-option { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px; }
        .radio-option input { margin: 0; width: 20px; height: 20px; }
        option:disabled { color: #a1a1a1; background: #eaeaea; font-style: italic; }
        button { background: #673ab7; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        button:disabled { background: #b39ddb; cursor: not-allowed; }
        .loading-text { font-style: italic; color: #5f6368; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-card">
        <h1>US Daily Essential Check</h1>
        <p id="loadingStatus" class="loading-text">Fetching roster config from Google Sheets...</p>
    </div>

    <form id="vanAuditForm" style="display:none;">
        <div class="card">
            <label class="card-title required" for="city">City Selection</label>
            <select id="city" required><option value="">Select City</option></select>
        </div>

        <div class="card">
            <label class="card-title required" for="associateName">Your Name</label>
            <select id="associateName" required disabled><option value="">Select city first...</option></select>
        </div>

        <div class="card">
            <label class="card-title required" for="vanId">Van ID</label>
            <select id="vanId" required disabled><option value="">Select city first...</option></select>
        </div>

        <div class="card"><span class="card-title required">Vacuum (expected qty 1)</span><div class="radio-group"><label class="radio-option"><input type="radio" name="vacuum" value="Confirmed" required> Confirmed</label><label class="radio-option"><input type="radio" name="vacuum" value="Missing"> Missing</label></div></div>
        <div class="card"><label class="card-title required" for="vacuumPhoto">Vacuum Photo Confirmation</label><input type="file" id="vacuumPhoto" accept="image/*" required></div>

        <div class="card"><span class="card-title required">Upholstery Machine (expected qty 1)</span><div class="radio-group"><label class="radio-option"><input type="radio" name="upholstery" value="Confirmed" required> Confirmed</label><label class="radio-option"><input type="radio" name="upholstery" value="Missing"> Missing</label></div></div>
        <div class="card"><label class="card-title required" for="upholsteryPhoto">Upholstery Machine Photo Confirmation</label><input type="file" id="upholsteryPhoto" accept="image/*" required></div>

        <div class="card"><span class="card-title required">Ozone Machine (expected qty 1)</span><div class="radio-group"><label class="radio-option"><input type="radio" name="ozone" value="Confirmed" required> Confirmed</label><label class="radio-option"><input type="radio" name="ozone" value="Missing"> Missing</label></div></div>
        <div class="card"><label class="card-title required" for="ozonePhoto">Ozone Machine Photo Confirmation</label><input type="file" id="ozonePhoto" accept="image/*" required></div>

        <div class="card"><span class="card-title required">Ladder (expected qty 1)</span><div class="radio-group"><label class="radio-option"><input type="radio" name="ladder" value="Confirmed" required> Confirmed</label><label class="radio-option"><input type="radio" name="ladder" value="Missing"> Missing</label></div></div>
        <div class="card"><label class="card-title required" for="ladderPhoto">Ladder Photo Confirmation</label><input type="file" id="ladderPhoto" accept="image/*" required></div>

        <div class="card"><span class="card-title required">Gas Tank &gt; 25%</span><div class="radio-group"><label class="radio-option"><input type="radio" name="gasTank" value="Yes" required> Yes</label><label class="radio-option"><input type="radio" name="gasTank" value="No"> No</label></div></div>

        <div class="card"><span class="card-title required">Cleaning Kit Fully Stocked?</span><div class="radio-group"><label class="radio-option"><input type="radio" name="cleaningKit" value="Yes" required> Yes</label><label class="radio-option"><input type="radio" name="cleaningKit" value="No"> No</label></div></div>
        <div class="card"><label class="card-title required" for="cleaningKitPhoto">Cleaning Kit Photo Confirmation</label><input type="file" id="cleaningKitPhoto" accept="image/*" required></div>

        <div class="card"><span class="card-title required">Rate the Van Cleanliness</span><div class="radio-group"><label class="radio-option"><input type="radio" name="cleanliness" value="5" required> 5 - Labelled, organized and clean</label><label class="radio-option"><input type="radio" name="cleanliness" value="4"> 4 - Mostly labelled, organized and clean</label><label class="radio-option"><input type="radio" name="cleanliness" value="3"> 3 - Some Issues</label><label class="radio-option"><input type="radio" name="cleanliness" value="2"> 2 - Multiple Issues</label><label class="radio-option"><input type="radio" name="cleanliness" value="1"> 1 - Poor Condition</label></div></div>

        <div class="card"><label class="card-title" for="cleanlinessNotes">Specific adjustment notes:</label><textarea id="cleanlinessNotes" rows="3"></textarea></div>
        <div class="card"><label class="card-title" for="cleanlinessIssuesPhoto">Photos of issues:</label><input type="file" id="cleanlinessIssuesPhoto" accept="image/*"></div>

        <div style="margin-bottom: 40px;"><button type="submit" id="submitBtn">Submit Check</button></div>
    </form>
</div>

<script>
    // FIXED: Active authorized deployment ID endpoint routing
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVs-rOXWSmco4txtloLLLUmwmlwciMERur-RpYZb3iyNMfmhbM_-nKLEpgywCQXCgj/exec";
    let sheetData = {};

    // Handles the cross-origin dynamic callback payload
    window.processSheetConfig = function(data) {
        sheetData = data;
        if (sheetData.error) {
            document.getElementById('loadingStatus').innerText = "Google Config Error: " + sheetData.error;
            return;
        }

        const cities = [...new Set(sheetData.associates.map(a => a.city))];
        const citySelect = document.getElementById('city');
        cities.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            citySelect.appendChild(opt);
        });

        document.getElementById('loadingStatus').style.display = 'none';
        document.getElementById('vanAuditForm').style.display = 'block';
    };

    window.addEventListener('DOMContentLoaded', () => {
        const jsonpScript = document.createElement('script');
        // FIXED: Replaced non-existent API_URL variable with SCRIPT_URL
        jsonpScript.src = SCRIPT_URL + "?callback=processSheetConfig";
        jsonpScript.onerror = () => {
            document.getElementById('loadingStatus').innerText = "Configuration fetch error. Connection restricted.";
        };
        document.body.appendChild(jsonpScript);
    });

    document.getElementById('city').addEventListener('change', (e) => {
        const selectedCity = e.target.value;
        const nameSelect = document.getElementById('associateName');
        const vanSelect = document.getElementById('vanId');
        const today = new Date().getTime();

        nameSelect.innerHTML = '<option value="">Select Name</option>';
        vanSelect.innerHTML = '<option value="">Select Van</option>';

        if(!selectedCity) {
            nameSelect.disabled = true; vanSelect.disabled = true;
            return;
        }

        sheetData.associates.filter(a => a.city === selectedCity).forEach(a => {
            let opt = document.createElement('option');
            opt.value = a.displayName; opt.textContent = a.displayName;
            nameSelect.appendChild(opt);
        });

        sheetData.vans.filter(v => v.city === selectedCity).forEach(v => {
            let opt = document.createElement('option');
            opt.value = v.vanId; opt.textContent = v.vanId;

            const maintenanceMatch = sheetData.disabledVans.find(d => d.vanId === v.vanId && today >= d.startDate && today <= d.endDate);
            if(maintenanceMatch) {
                opt.disabled = true;
                opt.textContent += ` (Disabled: ${maintenanceMatch.reason})`;
            }
            vanSelect.appendChild(opt);
        });

        nameSelect.disabled = false; vanSelect.disabled = false;
    });

    const toBase64 = file => new Promise((resolve, reject) => {
        if(!file) return resolve("");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
    });

    document.getElementById('vanAuditForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Processing Photos & Sending Data...";

        try {
            const payload = {
                submissionTimestamp: new Date().toISOString(),
                city: document.getElementById('city').value,
                associateName: document.getElementById('associateName').value,
                vanId: document.getElementById('vanId').value,
                vacuum: document.querySelector('input[name="vacuum"]:checked').value,
                upholstery: document.querySelector('input[name="upholstery"]:checked').value,
                ozone: document.querySelector('input[name="ozone"]:checked').value,
                ladder: document.querySelector('input[name="ladder"]:checked').value,
                gasTank: document.querySelector('input[name="gasTank"]:checked').value,
                cleaningKit: document.querySelector('input[name="cleaningKit"]:checked').value,
                cleanliness: document.querySelector('input[name="cleanliness"]:checked').value,
                cleanlinessNotes: document.getElementById('cleanlinessNotes').value,
                
                vacuumPhoto: await toBase64(document.getElementById('vacuumPhoto').files[0]),
                upholsteryPhoto: await toBase64(document.getElementById('upholsteryPhoto').files[0]),
                ozonePhoto: await toBase64(document.getElementById('ozonePhoto').files[0]),
                ladderPhoto: await toBase64(document.getElementById('ladderPhoto').files[0]),
                cleaningKitPhoto: await toBase64(document.getElementById('cleaningKitPhoto').files[0]),
                cleanlinessIssuesPhoto: await toBase64(document.getElementById('cleanlinessIssuesPhoto').files[0])
            };

            // FIXED: Replaced non-existent API_URL variable with SCRIPT_URL
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            alert("Van audit logged into system database completely!");
            document.getElementById('vanAuditForm').reset();
            document.getElementById('associateName').disabled = true;
            document.getElementById('vanId').disabled = true;
        } catch (err) {
            alert("Submission error.");
        } finally {
            btn.disabled = false; btn.innerText = "Submit Check";
        }
    });
</script>
</body>
</html>
